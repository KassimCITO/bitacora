{% extends "base.html" %}
{% block title %}Nuevo Usuario — Bitácora{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="{{ url_for('users.list_users') }}">Usuarios</a></li>
        <li class="breadcrumb-item active">Nuevo</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-transparent border-0">
                <h4 class="mb-0 fw-bold"><i class="bi bi-person-plus me-2 text-accent"></i>Nuevo Usuario</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('users.create') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="nombre_completo" class="form-label fw-medium">Nombre completo *</label>
                        <input type="text" class="form-control" id="nombre_completo" name="nombre_completo" required maxlength="150"
                               data-bs-toggle="tooltip" title="Ingresa el nombre completo del nuevo usuario.">
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="username" class="form-label fw-medium">Usuario *</label>
                            <input type="text" class="form-control" id="username" name="username" required maxlength="80"
                                   data-bs-toggle="tooltip" title="Nombre de usuario único para iniciar sesión.">
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label fw-medium">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" required maxlength="120"
                                   data-bs-toggle="tooltip" title="Correo electrónico del usuario para notificaciones.">
                        </div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6">
                            <label for="password" class="form-label fw-medium">Contraseña *</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6"
                                   data-bs-toggle="tooltip" title="Contraseña segura de al menos 6 caracteres.">
                        </div>
                        <div class="col-md-6">
                            <label for="role_id" class="form-label fw-medium">Rol *</label>
                            <select class="form-select" id="role_id" name="role_id" required
                                    data-bs-toggle="tooltip" title="Asigna un rol que define los permisos del usuario.">
                                <option value="">Seleccionar...</option>
                                {% for role in roles %}
                                <option value="{{ role.id }}">{{ role.name | capitalize }} — {{ role.description }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary"
                                data-bs-toggle="tooltip" title="Crear el nuevo usuario en el sistema.">
                            <i class="bi bi-check-lg me-1"></i> Crear
                        </button>
                        <a href="{{ url_for('users.list_users') }}" class="btn btn-outline-secondary"
                           data-bs-toggle="tooltip" title="Cancelar la creación y volver a la lista de usuarios.">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
