{% extends "base.html" %}
{% block title %}Editar Usuario — Bitácora{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="{{ url_for('users.list_users') }}">Usuarios</a></li>
        <li class="breadcrumb-item active">Editar</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-transparent border-0">
                <h4 class="mb-0 fw-bold"><i class="bi bi-pencil me-2 text-accent"></i>Editar Usuario</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('users.edit', user_id=user.id) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="nombre_completo" class="form-label fw-medium">Nombre completo *</label>
                        <input type="text" class="form-control" id="nombre_completo" name="nombre_completo" value="{{ user.nombre_completo }}" required
                               data-bs-toggle="tooltip" title="Modifica el nombre completo del usuario.">
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="username" class="form-label fw-medium">Usuario *</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required
                                   data-bs-toggle="tooltip" title="Modifica el nombre de usuario para iniciar sesión.">
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label fw-medium">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required
                                   data-bs-toggle="tooltip" title="Modifica el correo electrónico del usuario.">
                        </div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6">
                            <label for="password" class="form-label fw-medium">Nueva contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Dejar vacío para no cambiar"
                                   data-bs-toggle="tooltip" title="Ingresa una nueva contraseña si deseas cambiarla.">
                        </div>
                        <div class="col-md-6">
                            <label for="role_id" class="form-label fw-medium">Rol *</label>
                            <select class="form-select" id="role_id" name="role_id" required
                                    data-bs-toggle="tooltip" title="Cambia el rol y permisos del usuario.">
                                {% for role in roles %}
                                <option value="{{ role.id }}" {% if user.role_id == role.id %}selected{% endif %}>{{ role.name | capitalize }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary"
                                data-bs-toggle="tooltip" title="Guardar los cambios realizados en el usuario.">
                            <i class="bi bi-check-lg me-1"></i> Guardar
                        </button>
                        <a href="{{ url_for('users.list_users') }}" class="btn btn-outline-secondary"
                           data-bs-toggle="tooltip" title="Cancelar la edición y volver a la lista de usuarios.">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
