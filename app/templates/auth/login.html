{% extends "base.html" %}
{% block title %}Iniciar Sesión — Bitácora{% endblock %}

{% block content %}
<div class="row min-vh-75 align-items-center justify-content-center">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">
        <div class="login-card">
            <!-- Logo y título -->
            <div class="text-center mb-4">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Bitácora" height="64" class="mb-3 login-logo">
                <h1 class="h4 fw-bold mb-1">Bitácora</h1>
                <p class="text-muted small">Sistema de Gestión Operativa</p>
            </div>

            <!-- Formulario -->
            <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label for="username" class="form-label small fw-medium">
                        <i class="bi bi-person me-1"></i> Usuario
                    </label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username"
                           placeholder="Tu nombre de usuario" required autofocus autocomplete="username">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label small fw-medium">
                        <i class="bi bi-lock me-1"></i> Contraseña
                    </label>
                    <div class="input-group">
                        <input type="password" class="form-control form-control-lg" id="password" name="password"
                               placeholder="Tu contraseña" required autocomplete="current-password">
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword" tabindex="-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember" value="1">
                    <label class="form-check-label small" for="remember">Recordarme</label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 fw-medium" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar Sesión
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    // Toggle de visibilidad de contraseña
    document.getElementById('togglePassword').addEventListener('click', function() {
        const pwd = document.getElementById('password');
        const icon = this.querySelector('i');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pwd.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
</script>
{% endblock %}
